name: RSS自動取得バッチ

on:
  schedule:
    - cron: "0 18,0,6,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  batch:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: |
          pip install requests google-genai beautifulsoup4

      - name: バッチ処理を実行
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python batch.py

      - name: 結果CSVをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auto_results.csv
          git diff --cached --quiet || git commit -m "自動更新: $(date +'%Y-%m-%d %H:%M') JST"
          git push
