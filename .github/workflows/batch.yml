name: RSS自動取得バッチ

on:
  schedule:
    # 日本時間 3時・9時・15時・21時に実行（UTCで-9時間）
    - cron: "0 */2 * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # CSVをコミット・プッシュするために必要

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  batch:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: |
          pip install requests beautifulsoup4 google-genai

      - name: バッチ処理を実行
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python batch.py

      - name: 結果CSVをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/all_results.csv
          git diff --cached --quiet || git commit -m "自動更新: $(date +'%Y-%m-%d %H:%M') JST"
          git push
